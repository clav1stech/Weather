# Synchronise le tag mobile vX.Y et sa release GitHub avec le dépôt.
#
# Convention du projet : un seul tag/release par version Y, le tag est MOBILE
# (redéplacé sur le dernier commit de la ligne à chaque bump Z) et le corps de
# la release s'enrichit au fil des Z. Le corps vit dans docs/releases/<tag>.md,
# versionné avec le code — ce workflow ne fait que pousser le tag et recopier
# ce fichier dans la release. Déclenchement manuel uniquement : le passage en
# « Latest » reste une décision explicite, jamais automatique.
name: release-sync

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag mobile à synchroniser (ex. v2.5)"
        required: true
      target_sha:
        description: "Commit cible du tag (vide = HEAD de la branche de déclenchement)"
        required: false
        default: ""
      make_latest:
        description: "Promouvoir la release en Latest (retire le statut Pre-release)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Déplacer le tag mobile
        run: |
          set -euo pipefail
          SHA="${{ inputs.target_sha }}"
          if [ -z "$SHA" ]; then SHA="$(git rev-parse HEAD)"; fi
          git tag -f "${{ inputs.tag }}" "$SHA"
          git push -f origin "refs/tags/${{ inputs.tag }}"

      - name: Mettre à jour la release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES="docs/releases/${{ inputs.tag }}.md"
          if [ ! -f "$NOTES" ]; then
            echo "Fichier de notes absent : $NOTES" >&2
            exit 1
          fi
          ARGS=(--notes-file "$NOTES")
          if [ "${{ inputs.make_latest }}" = "true" ]; then
            ARGS+=(--prerelease=false --latest)
          fi
          gh release edit "${{ inputs.tag }}" "${ARGS[@]}"
