name: Data Pipeline Weather

on:
  schedule:
    # Open-Meteo (API, source principale) : toutes les 2h.
    - cron: '15 */2 * * *'
    # Météociel (legacy, sauvegarde + comparaison) : seulement à ses cycles réels
    # 0Z/12Z, publiés en intégralité avec retard (~midi / minuit heure de Paris).
    - cron: '15 10 * * *'   # 0Z
    - cron: '15 22 * * *'   # 12Z
    # Tx/Tn haute résolution (API Forecast, flux annexe) : toutes les 2h,
    # décalé de 30 min du fetch-api pour ne pas faire la queue au push.
    - cron: '45 */2 * * *'
    # Observations Météo-France (DPObs, flux annexe) : toutes les heures —
    # cadence VOLONTAIREMENT indépendante des autres jobs (l'API publie une
    # obs horaire par station ; 4 requêtes/h, quota 100 req/min très loin).
    # Décalé à :20 pour ne pas faire la queue au push avec :15 et :45.
    - cron: '20 * * * *'
    # Prévision Montsouris « vintages » 15 min (API Forecast minutely_15, flux
    # annexe) : toutes les heures. Chaque poll fige un vintage supplémentaire de
    # chaque échéance (historique des révisions conservé, cf.
    # fetch_montsouris_vintages.py) — une cadence horaire suffit à capturer la
    # convergence de la prévision sans gonfler la charge de push git. Créneau :50
    # libre (évite :05/:10/:15/:20/:25/:35/:40/:45/:55).
    - cron: '50 * * * *'
    # Observations infra-horaires 6 min (DPPaquetObs /paquet/infrahoraire-6m,
    # flux annexe) : toutes les 15 min — c'est la FRAÎCHEUR temps réel des
    # cartes station RADOME (Montsouris/Longchamp). Créneaux :10/:25/:40/:55
    # libres (évite :05/:15/:20/:35/:45). Le paquet étant une fenêtre glissante,
    # chaque poll rattrape tous les points 6 min depuis le précédent.
    - cron: '10,25,40,55 * * * *'
    # Pipeline neige Megève (apps/snow/pipeline/) : toutes les 2h, UN SEUL job
    # pour les deux flux (ensemble + maille fine) afin de limiter les push git.
    # Créneau :35 libre (évite :10/:15/:20/:25/:40/:45/:50/:55).
    - cron: '35 */2 * * *'
    # Observations Météo-France Alpes du Nord (flux annexe neige) : toutes les
    # heures, même cadence que les observations Paris — créneau :30 libre.
    - cron: '30 * * * *'
    # Rollover hot/cold des parquets neige : hebdomadaire (lundi 03:00 UTC),
    # minute :00 libre — surtout PAS la même minute qu'un cron horaire (deux
    # requêtes EN ATTENTE simultanées dans le même concurrency.group : GitHub
    # annulerait la plus ancienne).
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      target:
        description: "Job(s) à lancer (both = api + legacy ; t2m = Tx/Tn HD seul ; obs = observations MF horaires ; obs6m = observations 6 min ; vintages = prévision Montsouris 15 min ; snow = flux prévision neige Megève ; snow-ensemble / snow-hd = un seul flux neige ; snow-obs = observations Alpes du Nord ; snow-rollover = rollover hot/cold neige ; all = tous les flux)"
        type: choice
        options: [both, api, legacy, t2m, obs, obs6m, vintages, snow, snow-ensemble, snow-hd, snow-obs, snow-rollover, rollover-canicule, all]
        default: both
      canicule_rollover_execute:
        description: "rollover-canicule uniquement : 'execute' pour écrire réellement (défaut : dry-run sans aucune écriture)"
        type: choice
        options: ['dry-run', 'execute']
        default: 'dry-run'
      legacy_run:
        description: "Cycle Météociel (si target=legacy ou both). 6Z/18Z : manuel only, AIFS/GEFS uniquement (ECMWF ENS absent à ces cycles)."
        type: choice
        options: ['0Z', '6Z', '12Z', '18Z']
        default: '0Z'

jobs:
  fetch-api:
    if: |
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'both' || github.event.inputs.target == 'api' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '15 */2 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch and Push Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          shopt -s nullglob
          # Les parquets sont binaires : un `git pull --rebase` ne sait pas
          # fusionner deux écritures concurrentes (conflit non auto-résoluble,
          # contrairement à du texte) — on ne tente donc jamais ce merge côté
          # git. En cas d'échec de push, on repart de l'état distant à jour et
          # on relance la collecte : Forecast.py recalcule la fusion via
          # persist() (dédup par (run_date, modèle), anti-régression) sur
          # cette base fraîche, ce qui est toujours correct.
          n=0
          while true; do
            python Forecast.py
            git add data/*.parquet
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: base Open-Meteo synchronisée"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  fetch-t2m-hd:
    # Flux ANNEXE Tx/Tn haute résolution (forecast_t2m_hd.py → parquet séparé
    # data/database_paris_t2m.parquet). Fichier distinct des autres jobs, mais
    # le PUSH git, lui, est partagé : même concurrency.group pour sérialiser
    # (le cron 2h croise fatalement fetch-api ; sans groupe commun, courses de
    # push malgré le pull --rebase). Cron décalé de 30 min pour limiter la file.
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 't2m' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '45 */2 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch and Push T2m Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Le parquet est binaire : un `git pull --rebase` ne sait pas fusionner
          # deux écritures concurrentes — on ne tente donc jamais ce merge côté
          # git. En cas d'échec de push, on repart de l'état distant à jour et on
          # relance la collecte : forecast_t2m_hd.py recalcule la fusion via
          # persist() sur cette base fraîche, ce qui est toujours correct.
          n=0
          while true; do
            python forecast_t2m_hd.py
            # Le fichier peut ne pas exister au tout premier run si l'API n'a rien
            # renvoyé d'exploitable (le script sort alors sans écrire).
            if [ -f data/database_paris_t2m.parquet ]; then
              git add data/database_paris_t2m.parquet
            fi
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: base Tx/Tn HD synchronisée"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  fetch-observations:
    # Flux ANNEXE observations Météo-France (fetch_observations.py → parquet
    # séparé data/database_paris_observations.parquet). La clé API vit dans le
    # secret METEOFRANCE_API_KEY — jamais dans le code ni les logs (le script
    # ne l'affiche jamais, même partiellement). Même concurrency.group que les
    # autres jobs : la contention est sur le PUSH git du repo, pas les fichiers.
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'obs' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '20 * * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch and Push Observations Database
        env:
          METEOFRANCE_API_KEY: ${{ secrets.METEOFRANCE_API_KEY }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Le parquet est binaire : un `git pull --rebase` ne sait pas fusionner
          # deux écritures concurrentes — on ne tente donc jamais ce merge côté
          # git. En cas d'échec de push, on repart de l'état distant à jour et on
          # relance la collecte : fetch_observations.py recalcule la fusion via
          # persist() (dédup par (station_id, valid_time)) sur cette base
          # fraîche, ce qui est toujours correct (paquet en fenêtre glissante).
          n=0
          while true; do
            python fetch_observations.py
            # Le fichier peut ne pas exister au tout premier run si aucune
            # station n'a répondu (le script sort alors sans écrire).
            if [ -f data/database_paris_observations.parquet ]; then
              git add data/database_paris_observations.parquet
            fi
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: observations Météo-France synchronisées"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  fetch-observations-6m:
    # Flux ANNEXE observations 6 min (fetch_observations_6m.py → parquet séparé
    # data/database_paris_observations_6m.parquet). Même clé/secret et même
    # concurrency.group que les autres jobs (contention sur le PUSH git, pas les
    # fichiers). Cadence 15 min : c'est la fraîcheur temps réel des cartes RADOME.
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'obs6m' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '10,25,40,55 * * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch and Push Observations 6 min Database
        env:
          METEOFRANCE_API_KEY: ${{ secrets.METEOFRANCE_API_KEY }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Cadence la plus rapprochée des 6 jobs (15 min) : la plus exposée à
          # une collision de push malgré le concurrency.group partagé (file
          # d'attente GitHub non garantie, cf. note du job fetch-api). Le
          # parquet étant binaire, un `git pull --rebase` ne sait pas fusionner
          # deux écritures concurrentes (conflit non auto-résoluble, contrairement
          # à du texte) — on ne tente donc jamais ce merge côté git. En cas
          # d'échec de push, on repart de l'état distant à jour et on relance la
          # collecte : fetch_observations_6m.py recalcule la fusion via
          # persist() (dédup par clé (station_id, valid_time)) sur cette base
          # fraîche, ce qui est toujours correct (fenêtre glissante de l'API).
          n=0
          while true; do
            python fetch_observations_6m.py
            # Le fichier peut ne pas exister au tout premier run si aucune
            # station RADOME n'a répondu (le script sort alors sans écrire).
            if [ -f data/database_paris_observations_6m.parquet ]; then
              git add data/database_paris_observations_6m.parquet
            fi
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: observations 6 min synchronisées"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  fetch-vintages:
    # Flux ANNEXE prévision Montsouris « vintages » 15 min
    # (fetch_montsouris_vintages.py → parquet séparé
    # data/database_paris_montsouris_vintages.parquet). Aucune clé requise (API
    # Open-Meteo publique). Même concurrency.group que les autres jobs : la
    # contention est sur le PUSH git du repo, pas les fichiers. Le backfill
    # past_days est géré par le script (large au 1er run, modeste ensuite) ; la
    # compaction borne la table à chaque run.
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'vintages' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '50 * * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch and Push Vintages Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Le parquet est binaire : un `git pull --rebase` ne sait pas fusionner
          # deux écritures concurrentes — on ne tente donc jamais ce merge côté
          # git. En cas d'échec de push, on repart de l'état distant à jour et on
          # relance la collecte : fetch_montsouris_vintages.py recalcule la
          # fusion via persist() (append + compaction, fonctions pures) sur
          # cette base fraîche, ce qui est toujours correct.
          n=0
          while true; do
            python fetch_montsouris_vintages.py
            # Le fichier peut ne pas exister si l'API n'a rien renvoyé
            # d'exploitable (le script sort alors sans écrire).
            if [ -f data/database_paris_montsouris_vintages.parquet ]; then
              git add data/database_paris_montsouris_vintages.parquet
            fi
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: prévision Montsouris vintages 15 min synchronisée"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  fetch-snow:
    # Pipeline NEIGE Megève (apps/snow/pipeline/ → parquets séparés
    # apps/snow/data/db_megeve.parquet et db_megeve_hd.parquet — jamais dans
    # data/, réservé canicule/Paris). UN SEUL job pour les deux flux afin de
    # limiter les push git, mais scripts indépendants et relançables isolément
    # (workflow_dispatch : snow-ensemble / snow-hd). Même concurrency.group que
    # les autres jobs : la contention est sur le PUSH git, pas les fichiers.
    if: |
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'snow' || github.event.inputs.target == 'snow-ensemble' ||
       github.event.inputs.target == 'snow-hd' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '35 */2 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow eccodes

      - name: Fetch and Push Snow Databases
        env:
          METEOFRANCE_AROME_PI_KEY: ${{ secrets.METEOFRANCE_AROME_PI_KEY }}
          METEOFRANCE_AROME_KEY: ${{ secrets.METEOFRANCE_AROME_KEY }}
          METEOFRANCE_AROME_PE_KEY: ${{ secrets.METEOFRANCE_AROME_PE_KEY }}
          METEOFRANCE_ARPEGE_PE_KEY: ${{ secrets.METEOFRANCE_ARPEGE_PE_KEY }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          shopt -s nullglob
          # Sélection des flux : cron et target=snow/all lancent les deux ;
          # snow-ensemble / snow-hd relancent un flux isolément.
          RUN_ENS=true; RUN_HD=true
          [ "${{ github.event.inputs.target }}" = "snow-hd" ] && RUN_ENS=false
          [ "${{ github.event.inputs.target }}" = "snow-ensemble" ] && RUN_HD=false
          # Les parquets sont binaires : un `git pull --rebase` ne sait pas
          # fusionner deux écritures concurrentes — on ne tente donc jamais ce
          # merge côté git. En cas d'échec de push, on repart de l'état distant
          # à jour et on relance la collecte : chaque script recalcule la
          # fusion (dédup par clé, anti-régression) sur cette base fraîche,
          # ce qui est toujours correct.
          n=0
          while true; do
            [ "$RUN_ENS" = "true" ] && python apps/snow/pipeline/fetch_ensemble.py
            [ "$RUN_ENS" = "true" ] && python apps/snow/pipeline/fetch_pe_arome.py
            [ "$RUN_ENS" = "true" ] && python apps/snow/pipeline/fetch_pe_arpege.py
            [ "$RUN_HD" = "true" ] && python apps/snow/pipeline/fetch_arome_pi.py
            if [ "$RUN_HD" = "true" ]; then
              if [ -n "$METEOFRANCE_AROME_KEY" ]; then
                python apps/snow/pipeline/fetch_arome_ifs.py
              else
                echo "⚠️ Secret METEOFRANCE_AROME_KEY absent — AROME-IFS ignoré."
              fi
            fi
            [ "$RUN_HD" = "true" ] && python apps/snow/pipeline/fetch_hd.py
            # Les fichiers peuvent ne pas exister au tout premier run si l'API
            # n'a rien renvoyé d'exploitable (les scripts sortent sans écrire).
            for f in apps/snow/data/*.parquet; do git add "$f"; done
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: bases neige Megève synchronisées"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  fetch-snow-obs:
    # Flux ANNEXE observations Météo-France Alpes du Nord
    # (apps/snow/pipeline/fetch_observations.py → parquet séparé
    # apps/snow/data/db_obs_alpes.parquet). Même clé/secret METEOFRANCE_API_KEY
    # que les observations Paris (jamais dans le code ni les logs) et même
    # concurrency.group (contention sur le PUSH git, pas les fichiers).
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'snow-obs' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '30 * * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch and Push Snow Observations Database
        env:
          METEOFRANCE_API_KEY: ${{ secrets.METEOFRANCE_API_KEY }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Le parquet est binaire : un `git pull --rebase` ne sait pas fusionner
          # deux écritures concurrentes — on ne tente donc jamais ce merge côté
          # git. En cas d'échec de push, on repart de l'état distant à jour et on
          # relance la collecte : persist() recalcule la fusion (dédup par
          # (station_id, valid_time)) sur cette base fraîche, ce qui est
          # toujours correct (paquet en fenêtre glissante).
          n=0
          while true; do
            python apps/snow/pipeline/fetch_observations.py
            # Le fichier peut ne pas exister au tout premier run si aucune
            # station suivie n'a répondu (le script sort alors sans écrire).
            if [ -f apps/snow/data/db_obs_alpes.parquet ]; then
              git add apps/snow/data/db_obs_alpes.parquet
            fi
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: observations Alpes du Nord synchronisées"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  rollover-snow:
    # Rollover HOT/COLD des parquets neige (apps/snow/pipeline/rollover.py,
    # mécanique core/pipeline/hot_cold.py) : bascule le plus ancien des bases
    # hot vers les parquets *_archive (append-only), avec sauvegardes datées
    # (.bak, jamais committées : le glob ci-dessous ne prend que *.parquet) et
    # vérification stricte de non-perte AVANT toute écriture — en cas de doute
    # le script sort en erreur sans rien toucher. Hebdomadaire : le hot reste
    # borné sans multiplier les push. Idempotent : relançable sans effet si
    # rien à basculer (aucun commit dans ce cas).
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'snow-rollover' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '0 3 * * 1'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas pyarrow

      - name: Rollover and Push Snow Databases
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          shopt -s nullglob
          # Même discipline binaire que les autres jobs : jamais de pull
          # --rebase sur un parquet ; en cas d'échec de push on repart de
          # l'état distant et on rejoue le rollover (idempotent).
          n=0
          while true; do
            python apps/snow/pipeline/rollover.py
            for f in apps/snow/data/*.parquet; do git add "$f"; done
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: rollover hot/cold des bases neige"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  rollover-canicule:
    # Rollover HOT/COLD de la base canicule (tools/rollover_canicule.py,
    # mécanique core/pipeline/hot_cold.py) — DÉSACTIVÉ EN AUTOMATIQUE :
    # AUCUN cron et volontairement EXCLU de target=all. Déclenchement
    # workflow_dispatch manuel uniquement (target=rollover-canicule), et
    # l'écriture réelle exige EN PLUS l'input canicule_rollover_execute=execute
    # (défaut dry-run : rapport sans aucune écriture). Le script refuse de
    # surcroît toute exécution réelle hors de la branche main. Un cron ne sera
    # ajouté ici que sur demande explicite de l'utilisateur, après le merge en
    # main et la validation de la bascule (procédure :
    # docs/DESIGN_archivage_pipeline.md §7).
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'rollover-canicule'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas pyarrow

      - name: Rollover and Push Canicule Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          EXTRA=""
          [ "${{ github.event.inputs.canicule_rollover_execute }}" = "execute" ] && EXTRA="--execute"
          # Même discipline binaire que les autres jobs : jamais de pull
          # --rebase sur un parquet ; en cas d'échec de push on repart de
          # l'état distant et on rejoue le rollover (idempotent). En dry-run,
          # rien n'est écrit → aucun commit.
          n=0
          while true; do
            python tools/rollover_canicule.py $EXTRA
            git add data/database_paris.parquet
            if [ -f data/database_paris_archive.parquet ]; then
              git add data/database_paris_archive.parquet
            fi
            git diff-index --quiet HEAD && break
            git commit -m "Pipeline: rollover hot/cold de la base canicule"
            git push && break
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
          done

  scrape-legacy:
    if: |
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'both' || github.event.inputs.target == 'legacy' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '15 10 * * *' ||
      github.event.schedule == '15 22 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow beautifulsoup4 openpyxl

      - name: Resolve run label
        id: run_label
        run: |
          if [ "${{ github.event.schedule }}" = "15 10 * * *" ]; then
            LABEL="0Z"
          elif [ "${{ github.event.schedule }}" = "15 22 * * *" ]; then
            LABEL="12Z"
          else
            LABEL="${{ github.event.inputs.legacy_run }}"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Scrape Météociel (legacy)
        run: python Forecast_legacy.py ${{ steps.run_label.outputs.label }}

      - name: Cross-check legacy vs Open-Meteo
        run: python validate_cross_pipeline.py ${{ steps.run_label.outputs.label }}

      - name: Commit and Push Legacy Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Contrairement aux autres jobs, on garde ici le `pull --rebase` :
          # validate_cross_pipeline.py APPEND une ligne à data/cross_check_log.csv
          # (mode="a") à chaque appel, donc rejouer le scrape+contrôle croisé
          # dans une boucle de retry dupliquerait cette ligne — pas idempotent
          # comme les flux persist()/dédup par clé des autres jobs. Le csv est
          # du texte (mergeable par git) et les xlsx légacy sont des fichiers
          # NEUFS par (date, cycle) : un conflit binaire n'y est possible que si
          # deux runs ciblent exactement le même (date, cycle), cas rare vu la
          # cadence 2×/j sur créneaux réservés — accepté tel quel.
          shopt -s nullglob
          git add legacy/*.xlsx data/*.csv
          git diff-index --quiet HEAD || git commit -m "Pipeline: scrape legacy + contrôle croisé (${{ steps.run_label.outputs.label }})"
          n=0
          until git pull --rebase origin "${GITHUB_REF_NAME}" && git push; do
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
          done
