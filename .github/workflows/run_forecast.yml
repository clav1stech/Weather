name: Data Pipeline Weather

on:
  schedule:
    # Open-Meteo (API, source principale) : toutes les 2h.
    - cron: '15 */2 * * *'
    # Météociel (legacy, sauvegarde + comparaison) : seulement à ses cycles réels
    # 0Z/12Z, publiés en intégralité avec retard (~midi / minuit heure de Paris).
    - cron: '15 10 * * *'   # 0Z
    - cron: '15 22 * * *'   # 12Z
    # Tx/Tn haute résolution (API Forecast, flux annexe) : toutes les 2h,
    # décalé de 30 min du fetch-api pour ne pas faire la queue au push.
    - cron: '45 */2 * * *'
    # Observations Météo-France (DPObs, flux annexe) : toutes les heures —
    # cadence VOLONTAIREMENT indépendante des autres jobs (l'API publie une
    # obs horaire par station ; 4 requêtes/h, quota 100 req/min très loin).
    # Décalé à :20 pour ne pas faire la queue au push avec :15 et :45.
    - cron: '20 * * * *'
    # Prévision Montsouris « vintages » 15 min (API Forecast minutely_15, flux
    # annexe) : toutes les heures. Chaque poll fige un vintage supplémentaire de
    # chaque échéance (historique des révisions conservé, cf.
    # fetch_montsouris_vintages.py) — une cadence horaire suffit à capturer la
    # convergence de la prévision sans gonfler la charge de push git. Créneau :50
    # libre (évite :05/:10/:15/:20/:25/:35/:40/:45/:55).
    - cron: '50 * * * *'
    # Observations infra-horaires 6 min (DPPaquetObs /paquet/infrahoraire-6m,
    # flux annexe) : toutes les 15 min — c'est la FRAÎCHEUR temps réel des
    # cartes station RADOME (Montsouris/Longchamp). Créneaux :10/:25/:40/:55
    # libres (évite :05/:15/:20/:35/:45). Le paquet étant une fenêtre glissante,
    # chaque poll rattrape tous les points 6 min depuis le précédent.
    - cron: '10,25,40,55 * * * *'
  workflow_dispatch:
    inputs:
      target:
        description: "Job(s) à lancer (both = api + legacy ; t2m = Tx/Tn HD seul ; obs = observations MF horaires ; obs6m = observations 6 min ; vintages = prévision Montsouris 15 min ; all = tous les flux)"
        type: choice
        options: [both, api, legacy, t2m, obs, obs6m, vintages, all]
        default: both
      legacy_run:
        description: "Cycle Météociel (si target=legacy ou both). 6Z/18Z : manuel only, AIFS/GEFS uniquement (ECMWF ENS absent à ces cycles)."
        type: choice
        options: ['0Z', '6Z', '12Z', '18Z']
        default: '0Z'

jobs:
  fetch-api:
    if: |
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'both' || github.event.inputs.target == 'api' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '15 */2 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch Open-Meteo (API)
        run: python Forecast.py

      - name: Commit and Push Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          shopt -s nullglob
          git add data/*.parquet
          git diff-index --quiet HEAD || git commit -m "Pipeline: base Open-Meteo synchronisée"
          n=0
          until git pull --rebase origin "${GITHUB_REF_NAME}" && git push; do
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
          done

  fetch-t2m-hd:
    # Flux ANNEXE Tx/Tn haute résolution (forecast_t2m_hd.py → parquet séparé
    # data/database_paris_t2m.parquet). Fichier distinct des autres jobs, mais
    # le PUSH git, lui, est partagé : même concurrency.group pour sérialiser
    # (le cron 2h croise fatalement fetch-api ; sans groupe commun, courses de
    # push malgré le pull --rebase). Cron décalé de 30 min pour limiter la file.
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 't2m' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '45 */2 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch Open-Meteo Tx/Tn HD
        run: python forecast_t2m_hd.py

      - name: Commit and Push T2m Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Le fichier peut ne pas exister au tout premier run si l'API n'a rien
          # renvoyé d'exploitable (le script sort alors sans écrire) — pas d'échec
          # (if explicite : `[ -f ] && …` faux ferait tomber le shell `bash -e`).
          if [ -f data/database_paris_t2m.parquet ]; then
            git add data/database_paris_t2m.parquet
          fi
          git diff-index --quiet HEAD || git commit -m "Pipeline: base Tx/Tn HD synchronisée"
          n=0
          until git pull --rebase origin "${GITHUB_REF_NAME}" && git push; do
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
          done

  fetch-observations:
    # Flux ANNEXE observations Météo-France (fetch_observations.py → parquet
    # séparé data/database_paris_observations.parquet). La clé API vit dans le
    # secret METEOFRANCE_API_KEY — jamais dans le code ni les logs (le script
    # ne l'affiche jamais, même partiellement). Même concurrency.group que les
    # autres jobs : la contention est sur le PUSH git du repo, pas les fichiers.
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'obs' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '20 * * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch Météo-France Observations
        env:
          METEOFRANCE_API_KEY: ${{ secrets.METEOFRANCE_API_KEY }}
        run: python fetch_observations.py

      - name: Commit and Push Observations Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Le fichier peut ne pas exister au tout premier run si aucune station
          # n'a répondu (le script sort alors sans écrire) — pas d'échec.
          if [ -f data/database_paris_observations.parquet ]; then
            git add data/database_paris_observations.parquet
          fi
          git diff-index --quiet HEAD || git commit -m "Pipeline: observations Météo-France synchronisées"
          n=0
          until git pull --rebase origin "${GITHUB_REF_NAME}" && git push; do
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
          done

  fetch-observations-6m:
    # Flux ANNEXE observations 6 min (fetch_observations_6m.py → parquet séparé
    # data/database_paris_observations_6m.parquet). Même clé/secret et même
    # concurrency.group que les autres jobs (contention sur le PUSH git, pas les
    # fichiers). Cadence 15 min : c'est la fraîcheur temps réel des cartes RADOME.
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'obs6m' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '10,25,40,55 * * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch Météo-France Observations 6 min
        env:
          METEOFRANCE_API_KEY: ${{ secrets.METEOFRANCE_API_KEY }}
        run: python fetch_observations_6m.py

      - name: Commit and Push Observations 6 min Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Le fichier peut ne pas exister au tout premier run si aucune station
          # RADOME n'a répondu (le script sort alors sans écrire) — pas d'échec.
          if [ -f data/database_paris_observations_6m.parquet ]; then
            git add data/database_paris_observations_6m.parquet
          fi
          git diff-index --quiet HEAD || git commit -m "Pipeline: observations 6 min synchronisées"
          n=0
          until git pull --rebase origin "${GITHUB_REF_NAME}" && git push; do
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
          done

  fetch-vintages:
    # Flux ANNEXE prévision Montsouris « vintages » 15 min
    # (fetch_montsouris_vintages.py → parquet séparé
    # data/database_paris_montsouris_vintages.parquet). Aucune clé requise (API
    # Open-Meteo publique). Même concurrency.group que les autres jobs : la
    # contention est sur le PUSH git du repo, pas les fichiers. Le backfill
    # past_days est géré par le script (large au 1er run, modeste ensuite) ; la
    # compaction borne la table à chaque run.
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'vintages' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '50 * * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow

      - name: Fetch Open-Meteo Montsouris vintages (minutely_15)
        run: python fetch_montsouris_vintages.py

      - name: Commit and Push Vintages Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          # Le fichier peut ne pas exister si l'API n'a rien renvoyé
          # d'exploitable (le script sort alors sans écrire) — pas d'échec.
          if [ -f data/database_paris_montsouris_vintages.parquet ]; then
            git add data/database_paris_montsouris_vintages.parquet
          fi
          git diff-index --quiet HEAD || git commit -m "Pipeline: prévision Montsouris vintages 15 min synchronisée"
          n=0
          until git pull --rebase origin "${GITHUB_REF_NAME}" && git push; do
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
          done

  scrape-legacy:
    if: |
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'both' || github.event.inputs.target == 'legacy' || github.event.inputs.target == 'all')) ||
      github.event.schedule == '15 10 * * *' ||
      github.event.schedule == '15 22 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: weather-data-push
      cancel-in-progress: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas pyarrow beautifulsoup4 openpyxl

      - name: Resolve run label
        id: run_label
        run: |
          if [ "${{ github.event.schedule }}" = "15 10 * * *" ]; then
            LABEL="0Z"
          elif [ "${{ github.event.schedule }}" = "15 22 * * *" ]; then
            LABEL="12Z"
          else
            LABEL="${{ github.event.inputs.legacy_run }}"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Scrape Météociel (legacy)
        run: python Forecast_legacy.py ${{ steps.run_label.outputs.label }}

      - name: Cross-check legacy vs Open-Meteo
        run: python validate_cross_pipeline.py ${{ steps.run_label.outputs.label }}

      - name: Commit and Push Legacy Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          shopt -s nullglob
          git add legacy/*.xlsx data/*.csv
          git diff-index --quiet HEAD || git commit -m "Pipeline: scrape legacy + contrôle croisé (${{ steps.run_label.outputs.label }})"
          n=0
          until git pull --rebase origin "${GITHUB_REF_NAME}" && git push; do
            n=$((n + 1))
            [ "$n" -ge 5 ] && { echo "Échec du push après $n tentatives" >&2; exit 1; }
            sleep $((RANDOM % 10 + 5))
          done
